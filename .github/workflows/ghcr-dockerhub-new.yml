name: New Build and Push Multi-arch Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.5)'
        required: true
        default: 'v1.0.5'
        type: string
      push_to_hub:
        description: '推送到 Docker Hub'
        required: true
        default: true
        type: boolean

  push:
    tags:
      - 'v*.*.*'

  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: birdxs/file-transfer-go

jobs:
  build-and-push:
    name: ??? Build & Push Multi-arch Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: ?? Checkout code
        uses: actions/checkout@v4

      - name: ??? Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: ?? Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: ?? Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
          platforms: linux/amd64,linux/arm64

      - name: ?? Login to Docker Hub
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_to_hub == true)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: ?? Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfilefix
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_to_hub == true) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 为 ARM64 构建添加额外的 build-args 和配置
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          # 增加构建超时时间，并禁用一些可能导致问题的特性
          provenance: false
          sbom: false
          # 为 ARM64 构建设置更长的超时时间
          timeout: 30m

      - name: ?? Build Summary
        if: always()
        run: |
          echo "## ?? Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ?? Image Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: Multi-architecture" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ?? Usage" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# 拉取特定架构镜像" >> $GITHUB_STEP_SUMMARY
          echo "docker pull --platform linux/amd64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull --platform linux/arm64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 运行容器（自动选择对应架构）" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 8080:8080 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version || 'latest' }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
